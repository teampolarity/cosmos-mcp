<?xml version="1.0" encoding="UTF-8"?>
<!-- macOS app icon: black squircle with centered "c" glyph -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <pattern id="cbars-app" width="18" height="1024" patternUnits="userSpaceOnUse">
      <rect width="18" height="1024" fill="#FFFFFF"/>
      <rect width="2" height="1024" fill="#000000"/>
    </pattern>
    <!-- Clip to squircle so the oversized glyph never bleeds outside -->
    <clipPath id="squircle-clip">
      <rect width="1024" height="1024" rx="226" ry="226"/>
    </clipPath>
  </defs>
  <rect width="1024" height="1024" rx="226" ry="226" fill="#000000"/>
  <g clip-path="url(#squircle-clip)">
    <text x="512" y="580"
          font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
          font-weight="500"
          font-size="880"
          letter-spacing="-20"
          fill="url(#cbars-app)"
          text-anchor="middle"
          dominant-baseline="central">c</text>
  </g>
</svg>
